name: E2E Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Start backend
        run: uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir backend &
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Start frontend
        run: npm run preview -- --port 5173 --host &
        working-directory: frontend

      - name: Wait for services
        run: |
          npx --yes wait-on http://localhost:8000/api/v1/event-types --timeout 30000
          npx --yes wait-on http://localhost:5173 --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e --prefix frontend

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
